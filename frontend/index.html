<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposal Prompt Builder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Proposal Prompt Builder</h1>
        <p>Live from Google Sheets webhook pipeline</p>
      </header>

      <section class="panel status-panel">
        <div>
          <strong>Status:</strong>
          <span id="statusText">Waiting for first record...</span>
        </div>
        <div>
          <strong>Row:</strong>
          <span id="rowText">-</span>
        </div>
        <div>
          <strong>Updated:</strong>
          <span id="updatedText">-</span>
        </div>
      </section>

      <section class="panel controls">
        <span id="rowCountText">Rows loaded: 0</span>
        <button id="refreshBtn" type="button">Refresh now</button>
      </section>

      <section class="panel">
        <h2>Rows</h2>
        <div class="table-scroll">
          <table class="sheet-table">
            <thead id="rowTableHead"></thead>
            <tbody id="rowTableBody"></tbody>
          </table>
        </div>
      </section>

      <button id="openPromptBtn" class="fab-btn" type="button">Prompt Builder</button>

      <div id="promptModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="promptModalTitle">
        <div class="modal-panel panel">
          <div class="prompt-header">
            <h2 id="promptModalTitle">Prompt Builder</h2>
            <div class="modal-actions">
              <button id="copyBtn" class="icon-btn" type="button" title="Copy Prompt" aria-label="Copy Prompt">&#128203;</button>
              <button id="resetPromptBtn" class="btn-ghost" type="button">Reset</button>
              <button id="undoResetBtn" class="btn-ghost hidden" type="button">Undo Reset</button>
              <button id="closePromptBtn" class="btn-ghost" type="button">Close</button>
            </div>
          </div>
          <div class="prompt-tools">
            <span>Translation tools:</span>
            <button type="button" class="translate-icon-btn" data-prompt-translate-field="Industry">Industry EN</button>
            <button type="button" class="translate-icon-btn" data-prompt-translate-field="Erik's call notes">Call Notes EN</button>
            <button type="button" class="translate-icon-btn" data-prompt-translate-field="Info for Coders">Coder Notes EN</button>
          </div>
          <textarea id="promptOutput" rows="20" wrap="soft"></textarea>
        </div>
      </div>

      <div id="translationCard" class="translation-card hidden" role="dialog" aria-live="polite">
        <div class="translation-card-header">
          <strong id="translationCardTitle">Translation</strong>
          <button id="closeTranslationCardBtn" class="btn-ghost" type="button">Close</button>
        </div>
        <div class="translation-card-body">
          <div><strong>SK:</strong> <span id="translationSkValue"></span></div>
          <div><strong>EN:</strong> <span id="translationEnValue"></span></div>
        </div>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>

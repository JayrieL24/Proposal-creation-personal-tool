<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposal Prompt Builder</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Proposal Prompt Builder</h1>
        <p>Live from Google Sheets webhook pipeline</p>
      </header>

      <section class="panel status-panel">
        <div>
          <strong>Status:</strong>
          <span id="statusText">Waiting for first record...</span>
        </div>
        <div>
          <strong>Row:</strong>
          <span id="rowText">-</span>
        </div>
        <div>
          <strong>Updated:</strong>
          <span id="updatedText">-</span>
        </div>
      </section>

      <section class="panel controls">
        <span id="rowCountText">Rows loaded: 0</span>
        <button id="refreshBtn" type="button">Refresh now</button>
      </section>

      <section class="panel">
        <h2>Rows</h2>
        <table class="sheet-table">
          <thead id="rowTableHead"></thead>
          <tbody id="rowTableBody"></tbody>
        </table>
      </section>

      <button id="openPromptBtn" class="fab-btn" type="button">Prompt Builder</button>

      <div id="promptModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="promptModalTitle">
        <div class="modal-panel panel">
          <div class="prompt-header">
            <h2 id="promptModalTitle">Prompt Builder</h2>
            <div class="modal-actions">
              <button id="copyBtn" type="button">Copy Prompt</button>
              <button id="closePromptBtn" class="btn-ghost" type="button">Close</button>
            </div>
          </div>
          <label for="promptLanguage">Prompt language</label>
          <select id="promptLanguage">
            <option value="auto">Auto (EN -> SK)</option>
            <option value="en">English only</option>
            <option value="sk">Slovak only</option>
          </select>
          <textarea id="promptOutput" rows="20" readonly></textarea>
        </div>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
